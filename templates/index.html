<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Landing Image Generator</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 0; padding: 40px 16px; color: #111; background: #C9C9C4; }
      .card { width: min(420px, 100%); margin: 0 auto; padding: 24px; border: 1px solid #e5e7eb; border-radius: 12px; background: rgba(255,255,255,0.72); backdrop-filter: blur(6px); }
      label { display: block; margin-bottom: 8px; font-weight: 600; }
      textarea { width: 100%; min-height: 110px; padding: 12px; border-radius: 10px; border: 1px solid #d1d5db; }
      select { padding: 10px; border-radius: 10px; border: 1px solid #d1d5db; }
      .row { display: grid; grid-template-columns: 1fr; gap: 12px; margin-top: 16px; align-items: end; }
      .btn { display: inline-block; margin-top: 18px; padding: 12px 16px; border-radius: 10px; border: 0; background: #111827; color: white; cursor: pointer; }
      .muted { color: #6b7280; font-size: 14px; margin-top: 10px; }
      .error { margin-top: 12px; padding: 12px; border-radius: 10px; background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2 style="margin: 0 0 10px;">Генератор landing page</h2>
      <p class="muted" style="margin: 0 0 12px;">Новый запрос</p>

      {% if error %}
        <div class="error">{{ error }}</div>
      {% endif %}

      <form method="post" action="{{ url_for('generate') }}">
        <label for="prompt">Промпт</label>
        <textarea id="prompt" name="prompt" placeholder="Например: лендинг для онлайн-школы по английскому">{{ default_prompt or "" }}</textarea>

        <div class="row">
          <div>
            <label for="style">Стиль</label>
            <select id="style" name="style">
              {% for key, label in styles.items() %}
                <option value="{{ key }}" {% if default_style and default_style == key %}selected{% endif %}>{{ label }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <button class="btn" type="submit">Сгенерировать</button>
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
